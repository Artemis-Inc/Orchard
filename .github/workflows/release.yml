name: release

# Cut a release by pushing a version tag:
#   git tag v3.0.1 && git push origin v3.0.1
# Or re-run for an existing tag from the Actions tab / CLI:
#   gh workflow run release.yml -f tag=v3.0.0
#
# This cross-builds the `orch` CLI for macOS, Linux, and Windows, builds the
# .pkg and .msi installers, publishes a Docker image, and uploads everything to
# the GitHub Release for the tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v3.0.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  # Resolved per job below; the tag drives the version and the checkout ref.
  ORCH_REF: ${{ github.event.inputs.tag || github.ref }}

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p orch-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p orch-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="orch-${VERSION}-${{ matrix.target }}"
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/orch" "$stage/"
          cp README.md CHANGELOG.md "$stage/" 2>/dev/null || true
          tar -czf "${name}.tar.gz" -C "$stage" .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          name="orch-${VERSION}-${{ matrix.target }}"
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/orch.exe" "$stage/"
          (cd "$stage" && 7z a "$OLDPWD/${name}.zip" .)

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: |
            orch-*.tar.gz
            orch-*.zip
            target/${{ matrix.target }}/release/orch
            target/${{ matrix.target }}/release/orch.exe
          if-no-files-found: ignore

  macos-pkg:
    name: macOS .pkg
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with: { pattern: "bin-*apple-darwin", path: art }
      - name: Build universal binary and .pkg
        run: |
          mkdir -p out
          lipo -create -output out/orch \
            art/bin-aarch64-apple-darwin/target/aarch64-apple-darwin/release/orch \
            art/bin-x86_64-apple-darwin/target/x86_64-apple-darwin/release/orch
          chmod +x out/orch
          bash packaging/macos/build-pkg.sh "$VERSION" out/orch "Orchard-${VERSION}.pkg"
      - uses: actions/upload-artifact@v4
        with: { name: installer-pkg, path: "Orchard-*.pkg" }

  windows-msi:
    name: Windows .msi
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with: { name: bin-x86_64-pc-windows-msvc, path: art }
      - name: Install WiX
        # Pin WiX v4: v6+ requires accepting the paid Open Source Maintenance
        # Fee EULA, which cannot be accepted non-interactively in CI.
        run: dotnet tool install --global wix --version 4.0.5
      - name: Build .msi
        shell: bash
        run: |
          cp "art/target/x86_64-pc-windows-msvc/release/orch.exe" packaging/windows/orch.exe
          wix build packaging/windows/orchard.wxs \
            -d Version="${VERSION}" \
            -o "Orchard-${VERSION}-x86_64.msi"
      - uses: actions/upload-artifact@v4
        with: { name: installer-msi, path: "Orchard-*.msi" }

  release:
    name: publish release
    needs: [build, macos-pkg, windows-msi]
    # Publish whatever built, even if one installer job failed.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: art }
      - name: Gather assets and checksums
        run: |
          mkdir -p dist
          find art \( -name 'orch-*.tar.gz' -o -name 'orch-*.zip' \
            -o -name 'Orchard-*.pkg' -o -name 'Orchard-*.msi' \) -exec cp {} dist/ \;
          cd dist && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: false

  homebrew:
    name: update homebrew tap
    needs: release
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      # Check out the default branch (not the release tag) so this job always has
      # the current tooling (scripts/update-homebrew.sh), even when an older tag
      # is re-run. The version it publishes comes from the tag, not the tree.
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Regenerate the formula and push it to the tap
        env:
          # A personal access token with push access to
          # Artemis-Inc/homebrew-orchard. Without it this step is skipped, so the
          # release still succeeds; set the secret to enable auto-updates.
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -eu
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update."
            echo "Add the secret to auto-update the Homebrew tap on release."
            exit 0
          fi
          # Wait for the release assets (esp. SHA256SUMS) to be queryable.
          for i in $(seq 1 10); do
            if curl -fsSL "https://github.com/Artemis-Inc/Orchard/releases/download/v${VERSION}/SHA256SUMS" -o /tmp/SHA256SUMS; then break; fi
            sleep 6
          done
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Artemis-Inc/homebrew-orchard.git" tap
          mkdir -p tap/Formula
          sh scripts/update-homebrew.sh "$VERSION" /tmp/SHA256SUMS tap/Formula/orchard.rb
          cd tap
          git config user.name "Thomas Guthrie"
          git config user.email "officialthomasguthrie@gmail.com"
          if git diff --quiet; then
            echo "tap already up to date"
          else
            git add Formula/orchard.rb
            git commit -m "orchard ${VERSION}"
            git push origin HEAD
          fi

  docker:
    name: docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/artemis-inc/orchard:latest
            ghcr.io/artemis-inc/orchard:${{ env.VERSION }}
