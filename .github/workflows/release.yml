name: release

# Tag a version to cut a release:
#   git tag v3.0.1 && git push origin v3.0.1
# This cross-builds the `orch` CLI for macOS, Linux, and Windows, builds the
# .pkg and .msi installers, and publishes everything to a GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v3.0.1)"
        required: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p orch-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p orch-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="orch-${VERSION}-${{ matrix.target }}"
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/orch" "$stage/"
          cp README.md CHANGELOG.md "$stage/" 2>/dev/null || true
          # Flat archive: the binary sits at the archive root.
          tar -czf "${name}.tar.gz" -C "$stage" .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          name="orch-${VERSION}-${{ matrix.target }}"
          stage="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/orch.exe" "$stage/"
          (cd "$stage" && 7z a "$OLDPWD/${name}.zip" .)

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: |
            orch-*.tar.gz
            orch-*.zip
            target/${{ matrix.target }}/release/orch
            target/${{ matrix.target }}/release/orch.exe
          if-no-files-found: ignore

  macos-pkg:
    name: macOS .pkg
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with: { pattern: "bin-*apple-darwin", path: art }
      - name: Build universal binary and .pkg
        run: |
          mkdir -p out
          lipo -create -output out/orch \
            art/bin-aarch64-apple-darwin/target/aarch64-apple-darwin/release/orch \
            art/bin-x86_64-apple-darwin/target/x86_64-apple-darwin/release/orch
          chmod +x out/orch
          bash packaging/macos/build-pkg.sh "$VERSION" out/orch "Orchard-${VERSION}.pkg"
      - uses: actions/upload-artifact@v4
        with: { name: installer-pkg, path: "Orchard-*.pkg" }

  windows-msi:
    name: Windows .msi
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with: { name: bin-x86_64-pc-windows-msvc, path: art }
      - name: Install WiX
        run: dotnet tool install --global wix
      - name: Build .msi
        shell: bash
        run: |
          cp "art/target/x86_64-pc-windows-msvc/release/orch.exe" packaging/windows/orch.exe
          wix build packaging/windows/orchard.wxs \
            -d Version="${VERSION}" \
            -o "Orchard-${VERSION}-x86_64.msi"
      - uses: actions/upload-artifact@v4
        with: { name: installer-msi, path: "Orchard-*.msi" }

  release:
    name: publish release
    needs: [build, macos-pkg, windows-msi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: art }
      - name: Gather assets and checksums
        run: |
          mkdir -p dist
          find art -name 'orch-*.tar.gz' -o -name 'orch-*.zip' \
            -o -name 'Orchard-*.pkg' -o -name 'Orchard-*.msi' | while read -r f; do
            cp "$f" dist/
          done
          cd dist && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    name: docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/artemis-inc/orchard:latest
            ghcr.io/artemis-inc/orchard:${{ env.VERSION }}
